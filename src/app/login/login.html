<div id="contenedorHijo"   class="
  font-sans bg-[#f1f7fa] rounded-[20px]
  shadow-[0_10px_25px_rgba(0,0,0,0.15)]
  w-[95%] sm:w-[90%] lg:w-[85%]
  h-auto lg:h-[75vh]
  p-4 sm:p-6
  mx-auto my-6
  lg:absolute lg:top-1/2 lg:left-1/2 lg:-translate-x-1/2 lg:-translate-y-1/2
  lg:flex lg:items-center lg:gap-5
"
>
  <div id="imagenPortada">
    <img     class="hidden lg:flex flex-1 h-full items-center justify-center relative"
 id="ImagenInicio" src="./ImagenInicio.png" alt="Imagen de portada">
  </div>

  <div id="contendorLogin"
      class="
      w-full
      max-w-[520px]
      mx-auto
      h-auto
      lg:mx-0 lg:w-[30%] lg:h-[75%]
    "
  >
    <div id="contenedorFormulario">
      <form id="formulario">
        <img id="logo" src="./logo-essalud.png" alt="Logo">

        <div class="input-group">
          <i class="material-icons">person</i>
          <input type="text" placeholder="Número de documento" required>
        </div>

        <div class="input-group">
          <i class="material-icons">lock</i>
          <input type="password" placeholder="Contraseña" required>
        </div>

        <button class="enviar" type="submit">Enviar</button>
      </form>
      <div id="pieFormulario">
            <a href="">¿Olvidaste tu contraseña?</a>
            <a href="">Registrarse</a>
      </div>
    </div>
  </div>
</div>
